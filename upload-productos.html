window.subirProductos = async function() {
    const btn = document.getElementById('uploadBtn');
    const log = document.getElementById('log');
    btn.disabled = true;
    btn.textContent = "Subiendo...";
    log.innerHTML = '';

    let ok = 0, err = 0;

    for (const p of productos) {
        try {
            const { id, ...data } = p;
            await setDoc(doc(db, 'productos', id), data);
            log.innerHTML += `<span class="ok">✅ ${p.id} — ${p.name}</span>\n`;
            ok++;
        } catch (e) {
            log.innerHTML += `<span class="err">❌ Error en ${p.id}: ${e.message}</span>\n`;
            err++;
        }
    }

    log.innerHTML += `\n<span class="done">🎉 Listo: ${ok} productos subidos, ${err} errores.</span>\n`;
    btn.textContent = "✅ Completado";
};
